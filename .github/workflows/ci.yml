name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (zero warnings)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start postgres and redis
        run: docker compose -f docker/docker-compose.yml up -d postgres redis --wait

      - name: Verify services are healthy
        run: |
          docker compose -f docker/docker-compose.yml exec -T postgres pg_isready -U dispatch
          docker compose -f docker/docker-compose.yml exec -T redis redis-cli ping | grep -q PONG

      - name: Tear down
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
